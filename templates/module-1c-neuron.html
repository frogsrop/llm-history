<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Нейрон — LLM Evolution</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* ── Brain-neuron SVG ────────────────────────────── */
    .neuron-svg-wrap { margin: 16px 0; text-align: center; overflow-x: auto; }
    #brain-neuron-svg { max-width: 860px; width: 100%; }

    .signal-path {
      stroke-dasharray: 8 6;
      stroke-dashoffset: 100;
      transition: stroke-dashoffset 0.8s ease;
    }
    .signal-path.active { stroke-dashoffset: 0; }

    .soma-glow { transition: fill 0.4s ease, filter 0.4s ease; }
    .soma-glow.fired {
      fill: var(--epoch-neuron);
      filter: drop-shadow(0 0 12px var(--epoch-neuron));
    }

    .label-bio { fill: var(--text-muted); font-size: 11px; }
    .label-math { fill: var(--epoch-neuron); font-size: 12px; font-weight: 600; }

    /* ── Backprop card ──────────────────────────────── */
    #bp-svg { max-width: 860px; width: 100%; }

    .bp-fwd {
      stroke-dasharray: 8 6;
      stroke-dashoffset: 100;
      opacity: 0;
      transition: stroke-dashoffset 0.6s ease, opacity 0.15s ease;
    }
    .bp-fwd.active { stroke-dashoffset: 0; opacity: 1; }

    .bp-edge {
      transition: stroke 0.5s ease, stroke-width 0.5s ease;
    }
    .bp-edge.backprop {
      stroke: #F97316;
    }

    .bp-node {
      fill: var(--bg-card);
      stroke: var(--text-muted);
      stroke-width: 2;
      transition: fill 0.3s ease, stroke 0.3s ease, filter 0.3s ease;
    }
    .bp-node.fwd {
      fill: rgba(52,211,153,0.15);
      stroke: var(--epoch-neuron);
      filter: drop-shadow(0 0 6px var(--epoch-neuron));
    }
    .bp-node.err {
      fill: rgba(248,113,113,0.2);
      stroke: var(--epoch-llm);
      filter: drop-shadow(0 0 8px var(--epoch-llm));
    }
    .bp-node.ok {
      fill: rgba(52,211,153,0.3);
      stroke: var(--epoch-neuron);
      filter: drop-shadow(0 0 10px var(--epoch-neuron));
    }

    .loss-bar-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
      flex: 1;
    }
    .loss-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease, background 0.6s ease;
    }

    /* ── Dog pose pixel art ────────────────────────── */
    .dog-pose {
      transition: opacity 0.35s ease;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
    }
  </style>
</head>
<body>
  <nav id="sidebar"></nav>

  <main id="main-content">
    <h1 class="section-title">
      <span class="epoch-bar epoch-neuron"></span>Нейрон
    </h1>
    <p class="section-sub">1943–1969 — от мозга к первой нейронной сети</p>

    <!-- ═══════════════════════════════════════════════════
         CARD 1: Brain → Artificial neuron
         ═══════════════════════════════════════════════════ -->
    <div class="card">
      <div class="card-title">

        </span>
      </div>

      <div style="text-align:center;">

          <text x="400" y="157" fill="var(--text-muted)" font-size="20" text-anchor="middle">≈</text>
          <line x1="400" y1="172" x2="400" y2="280" stroke="var(--border)" stroke-width="1" stroke-dasharray="4 4"/>

  <script>
  (function() {
    // ════════════════════════════════════════════════════════
    // CARD 1: Brain → Artificial neuron animation
    // ════════════════════════════════════════════════════════
    const inputs = [
      { x: 0.7, w: 0.6 },
      { x: 0.9, w: 0.8 },
      { x: 0.3, w: 0.4 },
    ];
    const threshold = 1.0;
    let animating = false;

    function runSignalAnimation() {
      if (animating) return;
      animating = true;

      // Reset all
      document.querySelectorAll('.signal-path').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.soma-glow').forEach(s => s.classList.remove('fired'));
      document.getElementById('sum-display').textContent = '= ?';
      document.getElementById('output-text').textContent = '?';
      document.getElementById('output-circle').setAttribute('stroke', 'var(--text-muted)');

      const delay = window.animDelay ?? 400;

      // Step 1: activate input signals (both sides simultaneously)
      setTimeout(() => {
        ['sig-bio-1', 'sig-art-1'].forEach(id => document.getElementById(id).classList.add('active'));
      }, delay * 0);
      setTimeout(() => {
        ['sig-bio-2', 'sig-art-2'].forEach(id => document.getElementById(id).classList.add('active'));
      }, delay * 1);
      setTimeout(() => {
        ['sig-bio-3', 'sig-art-3'].forEach(id => document.getElementById(id).classList.add('active'));
      }, delay * 2);

      // Step 2: soma fires
      setTimeout(() => {
        const sum = inputs.reduce((s, inp) => s + inp.x * inp.w, 0);
        document.getElementById('sum-display').textContent = '= ' + sum.toFixed(2);
        const fired = sum >= threshold;

        document.getElementById('soma-bio').classList.toggle('fired', fired);
        document.getElementById('soma-art').classList.toggle('fired', fired);

        // Step 3: output signal
        setTimeout(() => {
          if (fired) {
            document.getElementById('sig-bio-out').classList.add('active');
            document.getElementById('sig-art-out').classList.add('active');
          }
          document.getElementById('output-text').textContent = fired ? '1' : '0';
          document.getElementById('output-circle').setAttribute('stroke', fired ? 'var(--epoch-neuron)' : 'var(--epoch-llm)');
          animating = false;
        }, delay);
      }, delay * 3);
    }

    document.getElementById('btn-signal').addEventListener('click', runSignalAnimation);

    // ════════════════════════════════════════════════════════
    // CARD 2: Backprop = Dog Training
    // ════════════════════════════════════════════════════════
    const attempts = [
      { cmd: '«Сидеть!»',  action: '*стоит*',       pose: 'stand',  loss: 0.85, feedback: '«Нет!»',     ok: false, fbColor: '#F87171' },
      { cmd: '«Сидеть!»',  action: '*пригибается*',  pose: 'crouch', loss: 0.62, feedback: '«Нет!»',    ok: false, fbColor: '#F87171' },
      { cmd: '«Сидеть!»',  action: '*садится*',      pose: 'sit',    loss: 0.08, feedback: '«Молодец!»', ok: true,  fbColor: '#34D399' },
      { cmd: '«Сидеть!»',  action: '*садится*',      pose: 'sit',    loss: 0.03, feedback: '«Молодец!»', ok: true,  fbColor: '#34D399' },
      { cmd: '«Лежать!»',  action: '*садится*',      pose: 'sit',    loss: 0.74, feedback: '«Нет!»',     ok: false, fbColor: '#F87171' },
      { cmd: '«Лежать!»',  action: '*садится*',      pose: 'sit',    loss: 0.51, feedback: '«Нет...»',   ok: false, fbColor: '#F87171' },
      { cmd: '«Лежать!»',  action: '*ложится*',      pose: 'lie',    loss: 0.06, feedback: '«Молодец!»', ok: true,  fbColor: '#34D399' },
      { cmd: '«Сидеть!»',  action: '*ложится*',      pose: 'lie',    loss: 0.45, feedback: '«Нет!»',     ok: false, fbColor: '#F87171' },
      { cmd: '«Сидеть!»',  action: '*садится*',      pose: 'sit',    loss: 0.04, feedback: '«Молодец!»', ok: true,  fbColor: '#34D399' },
      { cmd: '«Лежать!»',  action: '*ложится*',      pose: 'lie',    loss: 0.01, feedback: '«Молодец!»', ok: true,  fbColor: '#34D399' },
    ];

    // Edge weights per stage (index 0 = initial, 1..10 = after each attempt)
    const edgeWeights = [
      [1.5, 1.5, 1.5, 1.5, 1.5, 1.5, 1.5, 1.5],
      [1.7, 1.3, 1.6, 1.4, 1.3, 1.6, 1.6, 1.4],  // 1 ✗
      [1.9, 1.1, 1.8, 1.2, 1.1, 1.8, 1.8, 1.2],  // 2 ✗
      [2.0, 1.0, 1.9, 1.1, 1.0, 1.9, 1.9, 1.1],  // 3 ✓
      [2.0, 1.0, 1.9, 1.1, 1.0, 1.9, 2.0, 1.1],  // 4 ✓
      [1.8, 1.4, 1.7, 1.5, 1.2, 1.8, 1.7, 1.5],  // 5 ✗ shift
      [1.6, 1.7, 1.5, 1.8, 1.3, 2.0, 1.4, 1.8],  // 6 ✗
      [1.5, 1.8, 1.5, 1.9, 1.3, 2.1, 1.4, 1.9],  // 7 ✓
      [1.7, 1.6, 1.7, 1.7, 1.4, 1.9, 1.6, 1.7],  // 8 ✗ rebalance
      [1.8, 1.6, 1.8, 1.6, 1.5, 1.9, 1.7, 1.6],  // 9 ✓
      [1.9, 1.6, 1.8, 1.6, 1.5, 1.9, 1.8, 1.6],  // 10 ✓
    ];

    let bpAttempt = -1;
    let bpAnimating = false;
    let card1Played = false;

    function showDogPose(pose) {
      document.querySelectorAll('.dog-pose').forEach(g => g.setAttribute('opacity', '0'));
      const el = document.getElementById('dog-' + pose);
      if (el) el.setAttribute('opacity', '1');
    }

    function lossColor(loss) {
      if (loss > 0.6) return '#F87171';
      if (loss > 0.3) return '#F97316';
      if (loss > 0)   return '#FACC15';
      return '#34D399';
    }

    function resetBpSignals() {
      document.querySelectorAll('.bp-fwd').forEach(el => {
        el.style.transition = 'none';
        el.classList.remove('active');
        void el.offsetHeight;
        el.style.transition = '';
      });
      document.querySelectorAll('.bp-node').forEach(el => {
        el.classList.remove('fwd', 'err', 'ok');
      });
      document.querySelectorAll('.bp-edge').forEach(el => {
        el.classList.remove('backprop');
      });
    }

    function setEdgeWeights(stage) {
      const w = edgeWeights[stage];
      for (let i = 0; i < 8; i++) {
        const el = document.getElementById('bp-e-' + i);
        if (el) el.setAttribute('stroke-width', w[i]);
      }
    }

    function advanceAttempt() {
      if (bpAnimating) return;
      bpAttempt++;
      if (bpAttempt >= attempts.length) {
        resetBpCard();
        return;
      }
      runAttemptAnimation(attempts[bpAttempt]);
    }

    function runAttemptAnimation(att) {
      bpAnimating = true;
      const d = 450;

      resetBpSignals();
      document.getElementById('bp-command').textContent = att.cmd;
      document.getElementById('bp-dog-action').textContent = '';
      document.getElementById('bp-feedback').textContent = '';
      document.getElementById('bp-net-output').textContent = '';

      // Update counter
      document.getElementById('bp-counter').innerHTML =
        'Попытка: <strong style="color:var(--text);">' + (bpAttempt + 1) + '</strong> / ' + attempts.length;

      // Phase 1: Forward — input nodes activate
      setTimeout(() => {
        ['bp-n-i0', 'bp-n-i1', 'bp-n-i2'].forEach(id =>
          document.getElementById(id).classList.add('fwd'));
      }, d * 0);

      // Phase 2: Forward — input→hidden signals
      setTimeout(() => {
        document.querySelectorAll('.bp-fwd-ih').forEach(el => el.classList.add('active'));
      }, d * 1);

      // Phase 3: Hidden nodes activate + hidden→output signals
      setTimeout(() => {
        ['bp-n-h0', 'bp-n-h1'].forEach(id =>
          document.getElementById(id).classList.add('fwd'));
        document.querySelectorAll('.bp-fwd-ho').forEach(el => el.classList.add('active'));
      }, d * 2);

      // Phase 4: Output node + show result + dog pose
      setTimeout(() => {
        const outNode = document.getElementById('bp-n-o');
        outNode.classList.add(att.ok ? 'ok' : 'err');

        showDogPose(att.pose);
        document.getElementById('bp-dog-action').textContent = att.action;
        document.getElementById('bp-net-output').textContent = att.action.replace(/[*]/g, '');
      }, d * 3);

      // Phase 5: Feedback + loss + backprop flash
      setTimeout(() => {
        const fbEl = document.getElementById('bp-feedback');
        fbEl.textContent = att.feedback;
        fbEl.setAttribute('fill', att.fbColor);

        // Loss bar
        const pct = Math.round(att.loss * 100);
        document.getElementById('bp-loss-bar').style.width = pct + '%';
        document.getElementById('bp-loss-bar').style.background = lossColor(att.loss);
        document.getElementById('bp-loss-val').textContent = att.loss.toFixed(2);

        if (!att.ok) {
          // Backprop flash: edges turn orange
          document.querySelectorAll('.bp-edge').forEach(el => el.classList.add('backprop'));
        }
      }, d * 4);

      // Phase 6: Weights update, edges restore
      setTimeout(() => {
        document.querySelectorAll('.bp-edge').forEach(el => el.classList.remove('backprop'));
        setEdgeWeights(bpAttempt + 1);

        // Update button text on last attempt
        if (bpAttempt >= attempts.length - 1) {
          document.getElementById('btn-attempt').textContent = 'Сначала';
        }
        bpAnimating = false;
      }, d * 6);
    }

    function resetBpCard() {
      bpAttempt = -1;
      bpAnimating = false;
      resetBpSignals();
      setEdgeWeights(0);
      showDogPose('stand');
      document.getElementById('bp-command').textContent = '«...»';
      document.getElementById('bp-dog-action').textContent = '';
      document.getElementById('bp-feedback').textContent = '';
      document.getElementById('bp-net-output').textContent = '';
      document.getElementById('bp-counter').innerHTML =
        'Попытка: <strong style="color:var(--text);">—</strong> / ' + attempts.length;
      document.getElementById('bp-loss-bar').style.width = '0%';
      document.getElementById('bp-loss-val').textContent = '—';
      document.getElementById('btn-attempt').textContent = 'Следующая попытка →';
    }

    document.getElementById('btn-attempt').addEventListener('click', advanceAttempt);

    // Unified Space handler: first press → Card 1, then → Card 2
    document.addEventListener('animate', () => {
      if (!card1Played) {
        runSignalAnimation();
        card1Played = true;
      } else {
        advanceAttempt();
      }
    });

  })();
  </script>
</body>
</html>
